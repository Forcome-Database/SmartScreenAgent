services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartscreen-postgres
    environment:
      POSTGRES_USER: smartscreen
      POSTGRES_PASSWORD: smartscreen
      POSTGRES_DB: smartscreen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartscreen -d smartscreen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartscreen-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: smartscreen-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # WP5 HR web workspace (Next.js BFF). The FastAPI backend, Celery worker,
  # and Celery beat are intentionally NOT compose services (see README.md
  # "Quick start" — they run on the host via `uv run`), so this service has
  # no `depends_on`; it reaches the host-run backend via
  # `host.docker.internal`, which Docker Desktop resolves automatically.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartscreen-frontend
    environment:
      # Host-run FastAPI backend (see comment above); override if the
      # backend is reachable elsewhere.
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://host.docker.internal:8000}
      # No default: fail closed if unset rather than boot with a guessable
      # HMAC key. Set a real >=32-byte random secret (see frontend/.env.example).
      SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET:?SESSION_COOKIE_SECRET must be set}
      # Reuses the DingTalk AppKey already configured for the backend
      # (docker-compose loads repo-root .env for variable substitution) —
      # DingTalk's OAuth `client_id` must be the same AppKey the backend
      # uses to exchange the resulting auth_code.
      DINGTALK_CLIENT_ID: ${DINGTALK_APP_KEY:-}
      DINGTALK_REDIRECT_URI: ${DINGTALK_REDIRECT_URI:-http://localhost:3000/auth/callback}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
